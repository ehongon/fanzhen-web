<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- 墨黑色渐变 -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="40%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2d4a"/>
    </linearGradient>

    <!-- 远山渐变 -->
    <linearGradient id="mountain1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="mountain2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d2d4a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="mountain3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d3d5a"/>
      <stop offset="100%" stop-color="#2d2d4a"/>
    </linearGradient>

    <!-- 云雾渐变 -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(245,240,232,0.08)"/>
      <stop offset="50%" stop-color="rgba(245,240,232,0.03)"/>
      <stop offset="100%" stop-color="rgba(245,240,232,0)"/>
    </linearGradient>

    <!-- 太阳光芒 -->
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(212,165,116,0.6)"/>
      <stop offset="30%" stop-color="rgba(212,165,116,0.2)"/>
      <stop offset="100%" stop-color="rgba(212,165,116,0)"/>
    </radialGradient>

    <!-- 金色光晕 -->
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(212,165,116,0.15)"/>
      <stop offset="100%" stop-color="rgba(212,165,116,0)"/>
    </radialGradient>

    <!-- 水墨滤镜 -->
    <filter id="inkBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- 背景天空 -->
  <rect width="1440" height="900" fill="url(#skyGrad)"/>

  <!-- 金色光晕背景 -->
  <circle cx="720" cy="300" r="400" fill="url(#goldGlow)"/>

  <!-- 太阳光芒 -->
  <g opacity="0.6">
    <circle cx="720" cy="250" r="120" fill="url(#sunGrad)"/>
    <!-- 光芒射线 -->
    <g stroke="rgba(212,165,116,0.15)" stroke-width="1" fill="none">
      <line x1="720" y1="250" x2="720" y2="50"/>
      <line x1="720" y1="250" x2="850" y2="100"/>
      <line x1="720" y1="250" x2="920" y2="200"/>
      <line x1="720" y1="250" x2="950" y2="350"/>
      <line x1="720" y1="250" x2="920" y2="500"/>
      <line x1="720" y1="250" x2="850" y2="600"/>
      <line x1="720" y1="250" x2="720" y2="650"/>
      <line x1="720" y1="250" x2="590" y2="600"/>
      <line x1="720" y1="250" x2="520" y2="500"/>
      <line x1="720" y1="250" x2="490" y2="350"/>
      <line x1="720" y1="250" x2="520" y2="200"/>
      <line x1="720" y1="250" x2="590" y2="100"/>
    </g>
  </g>

  <!-- 远山层1 - 最远处 -->
  <path d="M0,600 Q200,450 400,520 Q600,480 800,500 Q1000,460 1200,520 Q1300,480 1440,550 L1440,900 L0,900 Z" 
        fill="url(#mountain1)" opacity="0.5" filter="url(#softBlur)"/>

  <!-- 远山层2 -->
  <path d="M0,650 Q150,550 300,580 Q500,520 700,560 Q900,530 1100,580 Q1250,540 1440,600 L1440,900 L0,900 Z" 
        fill="url(#mountain2)" opacity="0.6" filter="url(#inkBlur)"/>

  <!-- 远山层3 - 最近处 -->
  <path d="M0,700 Q100,620 250,650 Q450,600 650,640 Q850,610 1050,660 Q1200,630 1440,680 L1440,900 L0,900 Z" 
        fill="url(#mountain3)" opacity="0.7"/>

  <!-- 云雾层1 -->
  <g opacity="0.4">
    <ellipse cx="300" cy="550" rx="200" ry="30" fill="url(#cloudGrad)" filter="url(#softBlur)"/>
    <ellipse cx="700" cy="520" rx="250" ry="35" fill="url(#cloudGrad)" filter="url(#softBlur)"/>
    <ellipse cx="1100" cy="560" rx="180" ry="25" fill="url(#cloudGrad)" filter="url(#softBlur)"/>
  </g>

  <!-- 云雾层2 -->
  <g opacity="0.3">
    <ellipse cx="200" cy="620" rx="150" ry="20" fill="url(#cloudGrad)" filter="url(#softBlur)"/>
    <ellipse cx="600" cy="600" rx="200" ry="25" fill="url(#cloudGrad)" filter="url(#softBlur)"/>
    <ellipse cx="1000" cy="630" rx="160" ry="20" fill="url(#cloudGrad)" filter="url(#softBlur)"/>
  </g>

  <!-- 水面倒影 -->
  <rect x="0" y="750" width="1440" height="150" fill="url(#mountain1)" opacity="0.3"/>
  <ellipse cx="720" cy="760" rx="400" ry="15" fill="rgba(212,165,116,0.05)" filter="url(#softBlur)"/>

  <!-- 飞鸟剪影 -->
  <g fill="none" stroke="rgba(245,240,232,0.15)" stroke-width="1.5" stroke-linecap="round">
    <path d="M600,200 Q610,190 620,200 Q610,195 600,200"/>
    <path d="M650,180 Q660,170 670,180 Q660,175 650,180"/>
    <path d="M580,220 Q590,210 600,220 Q590,215 580,220"/>
    <path d="M800,150 Q810,140 820,150 Q810,145 800,150"/>
    <path d="M850,170 Q860,160 870,170 Q860,165 850,170"/>
  </g>

  <!-- 装饰性墨点 -->
  <g fill="rgba(15,15,26,0.4)">
    <circle cx="100" cy="300" r="40" filter="url(#softBlur)"/>
    <circle cx="1300" cy="400" r="50" filter="url(#softBlur)"/>
    <circle cx="200" cy="500" r="30" filter="url(#softBlur)"/>
    <circle cx="1200" cy="250" r="35" filter="url(#softBlur)"/>
  </g>

  <!-- 底部渐变遮罩 -->
  <rect x="0" y="800" width="1440" height="100" fill="url(#skyGrad)" opacity="0.8"/>
</svg>
