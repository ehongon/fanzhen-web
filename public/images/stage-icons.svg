<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <!-- 绿色光芒渐变 -->
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(74,124,89,0.4)"/>
      <stop offset="50%" stop-color="rgba(74,124,89,0.1)"/>
      <stop offset="100%" stop-color="rgba(74,124,89,0)"/>
    </radialGradient>

    <!-- 蓝色气流渐变 -->
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(91,141,184,0.4)"/>
      <stop offset="50%" stop-color="rgba(91,141,184,0.1)"/>
      <stop offset="100%" stop-color="rgba(91,141,184,0)"/>
    </radialGradient>

    <!-- 紫色光芒渐变 -->
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(139,111,174,0.4)"/>
      <stop offset="50%" stop-color="rgba(139,111,174,0.1)"/>
      <stop offset="100%" stop-color="rgba(139,111,174,0)"/>
    </radialGradient>

    <!-- 金色光芒渐变 -->
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(212,165,116,0.4)"/>
      <stop offset="50%" stop-color="rgba(212,165,116,0.1)"/>
      <stop offset="100%" stop-color="rgba(212,165,116,0)"/>
    </radialGradient>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="200" fill="transparent"/>

  <!-- ===== 炼形化精 ===== -->
  <g transform="translate(100, 100)">
    <!-- 绿色光芒背景 -->
    <circle cx="0" cy="0" r="60" fill="url(#greenGlow)"/>
    
    <!-- 身体轮廓 -->
    <g fill="none" stroke="#4a7c59" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <!-- 头部 -->
      <circle cx="0" cy="-35" r="12"/>
      <!-- 身体 -->
      <path d="M-15,-20 Q-20,0 -15,25 Q-10,45 0,50 Q10,45 15,25 Q20,0 15,-20"/>
      <!-- 手臂 -->
      <path d="M-15,-15 Q-30,-5 -35,15" opacity="0.7"/>
      <path d="M15,-15 Q30,-5 35,15" opacity="0.7"/>
      <!-- 腿部 -->
      <path d="M-8,45 Q-12,65 -10,80" opacity="0.7"/>
      <path d="M8,45 Q12,65 10,80" opacity="0.7"/>
    </g>
    
    <!-- 绿色光芒效果 -->
    <g stroke="#4a7c59" stroke-width="1" opacity="0.4">
      <line x1="-25" y1="-10" x2="-40" y2="-20"/>
      <line x1="25" y1="-10" x2="40" y2="-20"/>
      <line x1="-20" y1="20" x2="-35" y2="25"/>
      <line x1="20" y1="20" x2="35" y2="25"/>
    </g>
    
    <!-- 标签 -->
    <text x="0" y="55" text-anchor="middle" fill="#4a7c59" font-size="11" font-family="serif">炼形化精</text>
  </g>

  <!-- ===== 炼精化气 ===== -->
  <g transform="translate(300, 100)">
    <!-- 蓝色光芒背景 -->
    <circle cx="0" cy="0" r="60" fill="url(#blueGlow)"/>
    
    <!-- 身体轮廓 -->
    <g fill="none" stroke="#5b8db8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <!-- 头部 -->
      <circle cx="0" cy="-35" r="12"/>
      <!-- 身体 -->
      <path d="M-15,-20 Q-20,0 -15,25 Q-10,45 0,50 Q10,45 15,25 Q20,0 15,-20"/>
      <!-- 手臂 -->
      <path d="M-15,-15 Q-30,-5 -35,15" opacity="0.7"/>
      <path d="M15,-15 Q30,-5 35,15" opacity="0.7"/>
      <!-- 腿部 -->
      <path d="M-8,45 Q-12,65 -10,80" opacity="0.7"/>
      <path d="M8,45 Q12,65 10,80" opacity="0.7"/>
    </g>
    
    <!-- 丹田发光 -->
    <circle cx="0" cy="5" r="8" fill="rgba(91,141,184,0.3)" filter="url(#softBlur)"/>
    <circle cx="0" cy="5" r="4" fill="#5b8db8" opacity="0.6"/>
    
    <!-- 蓝色气流 -->
    <g fill="none" stroke="#5b8db8" stroke-width="1.5" opacity="0.5" stroke-linecap="round">
      <path d="M-20,5 Q-30,0 -25,-10"/>
      <path d="M20,5 Q30,0 25,-10"/>
      <path d="M-15,15 Q-25,20 -20,30"/>
      <path d="M15,15 Q25,20 20,30"/>
    </g>
    
    <!-- 标签 -->
    <text x="0" y="55" text-anchor="middle" fill="#5b8db8" font-size="11" font-family="serif">炼精化气</text>
  </g>

  <!-- ===== 炼气化神 ===== -->
  <g transform="translate(500, 100)">
    <!-- 紫色光芒背景 -->
    <circle cx="0" cy="0" r="60" fill="url(#purpleGlow)"/>
    
    <!-- 身体轮廓 -->
    <g fill="none" stroke="#8b6fae" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <!-- 头部 -->
      <circle cx="0" cy="-35" r="12"/>
      <!-- 身体 -->
      <path d="M-15,-20 Q-20,0 -15,25 Q-10,45 0,50 Q10,45 15,25 Q20,0 15,-20"/>
      <!-- 手臂 -->
      <path d="M-15,-15 Q-30,-5 -35,15" opacity="0.7"/>
      <path d="M15,-15 Q30,-5 35,15" opacity="0.7"/>
      <!-- 腿部 -->
      <path d="M-8,45 Q-12,65 -10,80" opacity="0.7"/>
      <path d="M8,45 Q12,65 10,80" opacity="0.7"/>
    </g>
    
    <!-- 头部光环 -->
    <ellipse cx="0" cy="-45" rx="20" ry="6" fill="none" stroke="#8b6fae" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="0" cy="-48" rx="15" ry="4" fill="none" stroke="#8b6fae" stroke-width="1" opacity="0.4"/>
    
    <!-- 紫色光芒 -->
    <g stroke="#8b6fae" stroke-width="1" opacity="0.4">
      <line x1="0" y1="-55" x2="0" y2="-65"/>
      <line x1="-10" y1="-52" x2="-15" y2="-60"/>
      <line x1="10" y1="-52" x2="15" y2="-60"/>
    </g>
    
    <!-- 标签 -->
    <text x="0" y="55" text-anchor="middle" fill="#8b6fae" font-size="11" font-family="serif">炼气化神</text>
  </g>

  <!-- ===== 炼神返虚 ===== -->
  <g transform="translate(700, 100)">
    <!-- 金色光芒背景 -->
    <circle cx="0" cy="0" r="60" fill="url(#goldGlow)"/>
    
    <!-- 身体轮廓 -->
    <g fill="none" stroke="#d4a574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <!-- 头部 -->
      <circle cx="0" cy="-35" r="12"/>
      <!-- 身体 -->
      <path d="M-15,-20 Q-20,0 -15,25 Q-10,45 0,50 Q10,45 15,25 Q20,0 15,-20"/>
      <!-- 手臂 -->
      <path d="M-15,-15 Q-30,-5 -35,15" opacity="0.7"/>
      <path d="M15,-15 Q30,-5 35,15" opacity="0.7"/>
      <!-- 腿部 -->
      <path d="M-8,45 Q-12,65 -10,80" opacity="0.7"/>
      <path d="M8,45 Q12,65 10,80" opacity="0.7"/>
    </g>
    
    <!-- 光芒四射 -->
    <g stroke="#d4a574" stroke-width="1" opacity="0.5" stroke-linecap="round">
      <line x1="0" y1="-55" x2="0" y2="-70"/>
      <line x1="0" y1="55" x2="0" y2="70"/>
      <line x1="-40" y1="0" x2="-55" y2="0"/>
      <line x1="40" y1="0" x2="55" y2="0"/>
      <line x1="-28" y1="-28" x2="-38" y2="-38"/>
      <line x1="28" y1="-28" x2="38" y2="-38"/>
      <line x1="-28" y1="28" x2="-38" y2="38"/>
      <line x1="28" y1="28" x2="38" y2="38"/>
    </g>
    
    <!-- 中心光点 -->
    <circle cx="0" cy="-35" r="3" fill="#d4a574" opacity="0.8"/>
    
    <!-- 标签 -->
    <text x="0" y="55" text-anchor="middle" fill="#d4a574" font-size="11" font-family="serif">炼神返虚</text>
  </g>
</svg>
